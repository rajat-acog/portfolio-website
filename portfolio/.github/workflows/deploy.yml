name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login dockerhub.aganitha.ai:4443 -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t astro-app .

      - name: Tag Image
        run: docker tag astro-app dockerhub.aganitha.ai:4443/chem/astro-app:latest

      - name: Push Image
        run: docker push dockerhub.aganitha.ai:4443/chem/astro-app:latest

      - name: Deploy to own3
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull dockerhub.aganitha.ai:4443/chem/astro-app:latest
            docker stop astro-app || true
            docker rm astro-app || true
            docker run -d -p 80:80 --name astro-app dockerhub.aganitha.ai:4443/chem/astro-app:latest